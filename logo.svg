<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <style>
      .shape { fill: #111111; }
      .text { fill: #111111; font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif; }
      .text-bold { font-weight: 800; font-size: 28px; letter-spacing: 2px; }
      .text-light { font-weight: 300; font-size: 20px; letter-spacing: 1.5px; fill: #555555; }
    </style>
  </defs>

  <g transform="translate(360, 200) scale(1.2)">
    <!-- COMECOT Geometric Representation based on visual structure -->
    <!-- Row 1: C O _ C O -->
    <!-- C (Top Left) -->
    <path class="shape" d="M -150 -60 A 35 35 0 0 0 -150 10 L -150 -10 A 15 15 0 0 1 -150 -40 Z" />
    <rect class="shape" x="-165" y="-60" width="15" height="70" />
    
    <!-- O -->
    <circle class="shape" cx="-80" cy="-25" r="35" />
    <circle class="shape" cx="-80" cy="-25" r="15" fill="#ffffff" />

    <!-- T Sideways / Abstract shape (Top Middle) -->
    <rect class="shape" x="-20" y="-60" width="60" height="20" />
    <rect class="shape" x="0" y="-40" width="20" height="50" />

    <!-- C -->
    <path class="shape" d="M 80 -60 A 35 35 0 0 0 80 10 L 80 -10 A 15 15 0 0 1 80 -40 Z" />
    <rect class="shape" x="65" y="-60" width="15" height="70" />

    <!-- O -->
    <circle class="shape" cx="150" cy="-25" r="35" />
    <circle class="shape" cx="150" cy="-25" r="15" fill="#ffffff" />


    <!-- Row 2: M E _ C O T -->
    <!-- M -->
    <path class="shape" d="M -165 40 L -165 110 L -140 110 L -140 70 L -115 110 L -90 70 L -90 110 L -65 110 L -65 40 L -90 40 L -115 80 L -140 40 Z" />

    <!-- E -->
    <rect class="shape" x="-35" y="40" width="55" height="18" />
    <rect class="shape" x="-35" y="65" width="40" height="18" />
    <rect class="shape" x="-35" y="92" width="55" height="18" />
    <rect class="shape" x="-35" y="40" width="18" height="70" />

    <!-- C -->
    <path class="shape" d="M 60 40 A 35 35 0 0 0 60 110 L 60 90 A 15 15 0 0 1 60 60 Z" />
    <rect class="shape" x="45" y="40" width="15" height="70" />

    <!-- O -->
    <circle class="shape" cx="130" cy="75" r="35" />
    <circle class="shape" cx="130" cy="75" r="15" fill="#ffffff" />

    <!-- T -->
    <rect class="shape" x="180" y="40" width="60" height="18" />
    <rect class="shape" x="201" y="58" width="18" height="52" />
  </g>

  <!-- Text Bottom -->
  <g transform="translate(400, 420)" text-anchor="middle">
    <text class="text text-bold" x="0" y="0">CONSEJO DE MEDIOS DE COMUNICACIÓN</text>
    <text class="text text-light" x="220" y="32">TLAXCALA</text>
  </g>
</svg>
